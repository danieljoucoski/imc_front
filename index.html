<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabs com api</title>
    <Style>
        body{
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            background: #f4f4f4;
        }
        .tabs{
            display: flex;
            margin-bottom: 10px;
        }
        .tab-btn{
            flex: 1;
            padding: 15px;
            cursor: pointer;
            border: none;
            background: #ddd;
            font-size: 16;
        }
        .tab-btn.active{
            background: #007bff;
            color: white;
        }
        .tab-content{
            display: none;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }
        .tab-content.active{
            display: block;
        }
        input{
            width: 100%;
            padding: 10px;
            margin: 8px;
            box-sizing: border-box;
        }
        button{
            padding: 12px;
            background: #28a745;
            color: white;
            border: none;
            width: 100%;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
        }
        .resultado{
            margin-top: 15px;
            padding: 15px;
            background: #eee;
            border-radius: 5px;
            min-height: 40px;
        }
    </Style>
</head>

<body>
    <div class="tabs">
        <button class="tab-btn active" onclick="abrirTab(0)">IMC</button>
        <button class="tab-btn active" onclick="abrirTab(1)">Média</button>
    </div>
    <div class="tab-content active">
        <h2>Calcular IMC</h2>
        <input type="text" id="nome" placeholder="Digite seu nome">
        <input type="number" id="idade" placeholder="Digite sua idade">
        <input type="number" id="altura" placeholder="Digite sua altura">
        <input type="number" id="peso" placeholder="Digite seu peso (kg)">
        <button onclick="calcularImc()">Calcular IMC</button>
        <div class="resultado" id="resultadoImc"></div>
    </div>
    <script>
        function abrirTab(index) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

            document.querySelectorAll('tab-content')[index].classList.add('active');
            document.querySelector('tab-btn')[index].classList.add('active');
        }
        function formatarResposta(resultado){
            if(resultado.erro){
                return `<div style="color:#721c24;padding:15px;background:#f8d7da;border:1px solid #f5c6cb;border-radius:5px;font-weight:bold;">
                    erro:${resultado.erro}</div>`;
            }
            let html=`<div style="padding:15px;background:#d4eda;color:#15724;border:1px solid #c3e6cd;border-radius:5px;"`;
                html+=`<h3 style=",margin-top=0;margin-bottom:15px;border-bottom:1px solid #c3e6cb;padding-bottom:5px;">sucesso</h3>`
                html+=`<ul style="list-style-type:none;padding-left:0;margin:0;"`;
                
                for(const[key,value]of Object.entries(resultado)){
                    let label=key.charAt(0).toLocaleUpperCase()+key.slice(1)
                    if(key.toLocaleLowerCase()==="imc"){
                        label="IMC";
                    }
                    html+=`<li style="margin-buttom:8px;font-size:16;">
                        <strong style="color:#0b2e13">${label}</strong> ${value}
                        </li>`
                }
                html+=`</ul>
                </div>`;
                return html;
        }   
        async function calcularImc(){
            const dados={
                nome: document.getElementById("nome").value,
                idade: document.getElementById('idade').value,
                altura: document.getElementById('altura').value,
                peso: document.getElementById('peso').value
            }
            try {
                const response = await fetch("http://localhost:3000/imc",{
                    method: "POST",
                    headers:{"content-type":"application/json"},
                    body: JSON.stringify(dados)
                });
                const resultado = await response.json();
                document.getElementById("resultadoImc").innerHTML = formatarResposta(resultado);
            } catch (error) {
                document.getElementById("resuktadoImc").innerHTML = formatarResposta({error: "Ocorreu um erro  inesperado. Por favor tente novamente mais tarde"});
            }
        }
    </script>
</body>

</html>
