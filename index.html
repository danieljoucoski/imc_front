<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabs com api</title>
    <link rel="stylesheet" href="index.css">
</head>
<script src="index.js"></script>
<body>
    <div class="tabs">
        <button class="tab-btn active" onclick="abrirTab(0)">Cadastrar cliente</button>
        <button class="tab-btn" onclick="abrirTab(1)">Pesquisar clientes</button>
    </div>
    <a id="logout" class="logout-link" onclick="logout()">Logout</a>


    <div class="tab-content active">
        <h2>Cadastrar cliente</h2>
        <input type="text" id="nome" placeholder="Digite seu nome">
        <input type="number" id="CPF" placeholder="Digite sue CPF">
        <input type="number" id="CEP" placeholder="Digite sua CEP" onblur="buscarEndereco()">
        <input type="text" id="rua" placeholder="Digite sua rua">
        <input type="text" id="cidade" placeholder="Digite sua cidade">
        <input type="text" id="estado" placeholder="Digite seu estado">
        <input type="number" id="numero" placeholder="Digite seu número">
        <button onclick="fazerCadastro()">Cadastrar</button>
        <div class="resultado" id="resultadoCadastro"></div>
    </div>
    <div class="tab-content">
        <h2>Pesquisar cliente</h2>
        <input type="text" id="pesquisarCPF" placeholder="Digite o CPF para identificar cliente">
        <button onclick="pesquisarCliente()">Pesquisar</button>
        <div class="resultado" id="clientes"></div>
    </div>
</body>

</html>
